# Phase-2a: strong-scaling fill-in at 201² GMG × {2,4,8} threads × N=3.
# Phase-1 only got threads=1. This sweep fills §6.4 of the defence.
#
# Projected time: ~15 min (9 runs; wall shrinks with threads from ~180 s
# at 2 threads to ~45 s at 8 threads in the best case). 1200 s budget.

schema_version: 1
change: add-gmg-stokes-defence

provisioning:
  instance_type: macbook-m1-local
  region: local
  ami_family: darwin-arm64
  on_demand: true

measurement:
  repetitions: 3
  thermal_throttle_reject: true
  thermal_throttle_max_retries: 2
  warn_above_throttle_fraction: 0.20
  budget_usd: 0
  wallclock_budget_s: 1200

binary:
  git_sha: HEAD
  build_flags:
    - -DOPT=ON
    - -DOMP=ON
    - -DTEST=ON

sweeps:
  - name: strong_scaling
    purpose: "phase-2 fill-in threads {2,4,8} at 201x201 GMG"
    grids:
      - { nx: 201, nz: 201 }
    lin_solvers: [3]
    n_threads: [2, 4, 8]
    txt_template: SolViRes201.txt
