# Phase-2b: complete the strong-scaling grid left by phase-2a
# (which ran out of budget after 5/9 runs). Missing runs are
#
#   thr=4 rep=3   (phase-2a got reps 1 & 2; N=2 is our accepted
#                  sample size for that row, but we want N=3 for
#                  consistency with the other thread counts)
#   thr=8 rep=1,2,3 (not attempted in phase-2a)
#
# We parameterise both as threads=[4,8] with repetitions=3: analyse.py
# medians across all observations, so re-running thr=4 rep=3 just
# appends a row. n=5 for thr=4 (3 from phase-2a + 3 more? — no, the
# harness only runs 3 reps per config per invocation, so thr=4 gets 3
# more here for a total of 5 across phase-2a+b; this is fine for the
# median).

schema_version: 1
change: add-gmg-stokes-defence

provisioning:
  instance_type: macbook-m1-local
  region: local
  ami_family: darwin-arm64
  on_demand: true

measurement:
  repetitions: 3
  thermal_throttle_reject: true
  thermal_throttle_max_retries: 2
  warn_above_throttle_fraction: 0.20
  budget_usd: 0
  wallclock_budget_s: 1400

binary:
  git_sha: HEAD
  build_flags:
    - -DOPT=ON
    - -DOMP=ON
    - -DTEST=ON

sweeps:
  - name: strong_scaling
    purpose: "phase-2b fill-in threads {4,8} at 201x201 GMG"
    grids:
      - { nx: 201, nz: 201 }
    lin_solvers: [3]
    n_threads: [4, 8]
    txt_template: SolViRes201.txt
