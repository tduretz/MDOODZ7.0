# Phase-3: single 801² GMG @ 8 threads × N=1 as a memory-scaling anchor.
# Phase-1 skipped 801² because of the 1-hour per-run projection; at
# 8 threads the run-time should halve-to-quarter, making N=1 affordable
# inside a 75-minute cap. Wall-time at 801² is not a defence-grade
# measurement on N=1 but peak RSS is well-behaved run-to-run, and this
# anchors the §6.2 α-extrapolation to the scale where the CHOLMOD
# memory wall actually matters.

schema_version: 1
change: add-gmg-stokes-defence

provisioning:
  instance_type: macbook-m1-local
  region: local
  ami_family: darwin-arm64
  on_demand: true

measurement:
  repetitions: 1
  thermal_throttle_reject: false
  thermal_throttle_max_retries: 1
  warn_above_throttle_fraction: 0.5
  budget_usd: 0
  wallclock_budget_s: 4500

binary:
  git_sha: HEAD
  build_flags:
    - -DOPT=ON
    - -DOMP=ON
    - -DTEST=ON

sweeps:
  - name: memory_scaling_801
    purpose: "single 801x801 GMG RSS anchor at 8 threads"
    grids:
      - { nx: 801, nz: 801 }
    lin_solvers: [3]
    n_threads: [8]
    txt_template: SolViRes41.txt
