<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDOODZ WebVis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="header-title">MDOODZ WebVis</span>
      <span id="header-field" class="header-field"></span>
      <span id="header-time" class="header-time">
        <span id="time-display"></span>
        <select id="time-unit-select">
          <option value="">Auto</option>
          <option value="yr">yr</option>
          <option value="ka">ka</option>
          <option value="Ma">Ma</option>
        </select>
      </span>
    </header>
    <aside id="controls"></aside>
    <main id="canvas-area">
      <canvas id="field-canvas"></canvas>
      <canvas id="colourbar-canvas" width="80" height="400"></canvas>
      <div id="loading-overlay" class="hidden">Loading…</div>
    </main>
    <footer id="status-bar"></footer>
  </div>
  <script type="module" src="app.mjs"></script>
</body>
</html>
